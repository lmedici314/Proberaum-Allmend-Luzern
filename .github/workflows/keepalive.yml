name: Supabase Keepalive

on:
  schedule:
    - cron: '0 6 * * *'  # täglich um 06:00 UTC
  workflow_dispatch:       # manueller Start möglich

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Insert and delete test reservations
        run: |
          BASE_URL="${{ secrets.SUPABASE_URL }}/rest/v1"
          SERVICE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

          # Hole eine beliebige User-ID aus profiles
          USER_ID=$(curl -s \
            "$BASE_URL/profiles?select=id&limit=1" \
            -H "apikey: $SERVICE_KEY" \
            -H "Authorization: Bearer $SERVICE_KEY" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")

          echo "Using user_id: $USER_ID"

          # Buchung 1: Studio 01.05.2026 14:00-16:00 UTC
          ID1=$(curl -s -X POST \
            "$BASE_URL/reservations" \
            -H "apikey: $SERVICE_KEY" \
            -H "Authorization: Bearer $SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "{\"user_id\":\"$USER_ID\",\"room\":\"studio\",\"start_at\":\"2026-05-01T14:00:00+00\",\"end_at\":\"2026-05-01T16:00:00+00\",\"title\":\"keepalive\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")

          echo "Inserted ID1: $ID1"

          # Buchung 2: Jam 01.05.2026 20:00-22:00 UTC
          ID2=$(curl -s -X POST \
            "$BASE_URL/reservations" \
            -H "apikey: $SERVICE_KEY" \
            -H "Authorization: Bearer $SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "{\"user_id\":\"$USER_ID\",\"room\":\"jam\",\"start_at\":\"2026-05-01T20:00:00+00\",\"end_at\":\"2026-05-01T22:00:00+00\",\"title\":\"keepalive\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")

          echo "Inserted ID2: $ID2"

          # Beide wieder löschen
          curl -s -X DELETE \
            "$BASE_URL/reservations?id=eq.$ID1" \
            -H "apikey: $SERVICE_KEY" \
            -H "Authorization: Bearer $SERVICE_KEY"

          curl -s -X DELETE \
            "$BASE_URL/reservations?id=eq.$ID2" \
            -H "apikey: $SERVICE_KEY" \
            -H "Authorization: Bearer $SERVICE_KEY"

          echo "Deleted both reservations. Keepalive done."
